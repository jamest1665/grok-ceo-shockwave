name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    - name: Install dev dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e '.[dev]'
    - name: Ruff lint
      run: ruff check .
    - name: Ruff format check
      run: ruff format --check .
    - name: Type check (mypy)
      run: mypy . --ignore-missing-imports || true  # relax for stubs
    - name: Run tests
      run: pytest --tb=short